  <body>
    <div id="app"></div>
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (segment) {
              return segment.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, "", l.pathname + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
